<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK Point AI Native Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
    --bg: #0a0a0f; --card: #12121a; --border: #1e1e2e;
    --text: #e0e0e8; --text-dim: #6b6b7b;
    --accent: #6366f1; --accent-glow: rgba(99,102,241,0.15);
    --green: #22c55e; --yellow: #eab308; --blue: #3b82f6; --red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; padding:2rem; }
.header { text-align:center; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
.header h1 { font-size:1.8rem; font-weight:700; background:linear-gradient(135deg,#6366f1,#8b5cf6,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header .date { color:var(--text-dim); font-size:0.9rem; }

/* Filters */
.filters { display:flex; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap; align-items:center; }
.filter-group { display:flex; gap:0.4rem; flex-wrap:wrap; align-items:center; }
.filter-group label { font-size:0.8rem; color:var(--text-dim); margin-right:0.3rem; }
.filter-btn {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:0.4rem 0.8rem; color:var(--text-dim); cursor:pointer; font-size:0.8rem;
    transition:all 0.2s;
}
.filter-btn:hover { border-color:var(--accent); color:var(--text); }
.filter-btn.active { background:var(--accent-glow); border-color:var(--accent); color:var(--accent); font-weight:600; }

/* KPI */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.8rem; margin-bottom:1.5rem; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1rem; text-align:center; }
.kpi-value { font-size:1.8rem; font-weight:700; color:var(--accent); }
.kpi-label { font-size:0.75rem; color:var(--text-dim); }

/* Charts */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:2rem; }
.chart-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
.chart-card h3 { font-size:0.85rem; color:var(--text-dim); margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.05em; }

/* Members */
.section-title { font-size:1.1rem; font-weight:600; margin:2rem 0 1rem; padding-left:0.5rem; border-left:3px solid var(--accent); }
.members-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:1.5rem; margin-bottom:2rem; }
.member-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; cursor:pointer; transition:all 0.2s; }
.member-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.member-card.selected { border-color:var(--accent); box-shadow:0 0 20px var(--accent-glow); }
.member-card.high { border-left:3px solid var(--green); }
.member-card.mid { border-left:3px solid var(--yellow); }
.member-card.low { border-left:3px solid var(--blue); }
.member-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.member-header h3 { font-size:1.1rem; }
.member-badge { background:var(--accent-glow); color:var(--accent); padding:0.2rem 0.6rem; border-radius:20px; font-size:0.75rem; font-weight:600; }
.member-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; margin-bottom:1rem; }
.stat-item { text-align:center; }
.stat-value { font-size:1.2rem; font-weight:700; }
.stat-label { font-size:0.7rem; color:var(--text-dim); }
.tools-section h4 { font-size:0.75rem; color:var(--text-dim); margin-bottom:0.5rem; text-transform:uppercase; }
.tool-row { display:flex; align-items:center; gap:0.5rem; margin-bottom:0.3rem; font-size:0.8rem; }
.tool-name { width:100px; text-align:right; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tool-bar-bg { flex:1; height:6px; background:var(--border); border-radius:3px; }
.tool-bar { height:100%; background:var(--accent); border-radius:3px; }
.tool-count { width:35px; text-align:right; font-weight:600; font-size:0.75rem; }
.efficiency { display:grid; grid-template-columns:repeat(3,1fr); gap:0.5rem; margin-top:0.8rem; padding-top:0.8rem; border-top:1px solid var(--border); }
.eff-item { text-align:center; }
.eff-value { font-size:1rem; font-weight:700; }
.eff-value.good { color:var(--green); }
.eff-value.mid { color:var(--yellow); }
.eff-value.low { color:var(--red); }
.eff-label { font-size:0.65rem; color:var(--text-dim); }
.skills { margin-top:0.8rem; }
.skill-tag { display:inline-block; background:rgba(34,197,94,0.1); color:var(--green); padding:0.15rem 0.5rem; border-radius:4px; font-size:0.75rem; margin:0.15rem; font-family:monospace; }

/* Detail panel */
.detail-panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:2rem; display:none; }
.detail-panel.visible { display:block; }
.detail-panel h3 { margin-bottom:1rem; }
.detail-close { float:right; cursor:pointer; color:var(--text-dim); font-size:1.2rem; }
.detail-close:hover { color:var(--text); }

.missing-section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-bottom:2rem; }
.missing-section h4 { color:var(--text-dim); margin-bottom:0.5rem; }
.missing-names { color:var(--yellow); margin-bottom:0.8rem; }
.missing-section code { display:block; background:var(--bg); padding:0.8rem; border-radius:6px; font-size:0.8rem; color:var(--green); word-break:break-all; }
.footer { text-align:center; color:var(--text-dim); font-size:0.75rem; margin-top:2rem; padding-top:1rem; border-top:1px solid var(--border); }
@media (max-width:768px) { .charts-grid,.members-grid { grid-template-columns:1fr; } body { padding:1rem; } }
</style>
</head>
<body>

    <h1>ARK Point AI Native Dashboard</h1>
    <div class="date">2026-03-20 | AI Native 워크플로우 모니터링</div>

<div class="filters">

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
    <span class="detail-close" onclick="closeDetail()">&times;</span>
    <h3 id="detailTitle"></h3>
    <div class="member-stats" id="detailStats"></div>
    <div class="charts-grid" style="margin-top:1rem">

        <div class="chart-card"><h3>도구 사용 분포</h3><canvas id="detailToolChart"></canvas></div>
    </div>
</div>

<!-- Members -->

            </div>
            <div class="efficiency">
                <div class="eff-item"><div class="eff-value ${toolRatioClass}">${toolRatio}x</div><div class="eff-label">도구/대화 비율</div></div>
                <div class="eff-item"><div class="eff-value ${outputClass}">${outputRate}%</div><div class="eff-label">산출물 비율</div></div>
                <div class="eff-item"><div class="eff-value ${avgClass}">${Object.keys(totals.skills).length}</div><div class="eff-label">스킬 활용</div></div>
            </div>
            <div class="tools-section"><h4>도구 사용</h4>${toolBars}</div>
            ${skillTags ? '<div class="skills">'+skillTags+'</div>' : ''}
        `;
        grid.appendChild(card);
    });
}

function renderMemberTrendChart(members, dates) {
    const ctx = document.getElementById('memberTrendChart');
    if (memberTrendChart) memberTrendChart.destroy();
    const displayDates = currentDateFilter === 'all' ? ALL_DATES.slice(-7) : dates;
    const datasets = members.map((m, i) => ({
        label: m.toUpperCase(),
        data: displayDates.map(d => (MEMBERS_DAILY[m]||{})[d]?.tool_calls || 0),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: COLORS[i % COLORS.length] + '20',
        fill: true, tension: 0.3,
    }));
    memberTrendChart = new Chart(ctx, {
        type: 'line',
        data: { labels: displayDates.map(d => d.slice(5)), datasets },
        options: chartOpts(),
    });
}

function renderDailyCompareChart(members, dates) {
    const ctx = document.getElementById('dailyCompareChart');
    if (dailyCompareChart) dailyCompareChart.destroy();
    const displayDates = currentDateFilter === 'all' ? ALL_DATES.slice(-7) : dates;
    const datasets = members.map((m, i) => ({
        label: m.toUpperCase(),
        data: displayDates.map(d => (MEMBERS_DAILY[m]||{})[d]?.sessions || 0),
        backgroundColor: COLORS[i % COLORS.length],
    }));
    dailyCompareChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: displayDates.map(d => d.slice(5)), datasets },
        options: chartOpts(),
    });
}

// === DETAIL VIEW ===
function showDetail(member) {
    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');
    document.getElementById('detailTitle').textContent = member.toUpperCase() + ' 상세';

    const md = MEMBERS_DAILY[member] || {};
    const dates = Object.keys(md).sort().slice(-7);

    // Stats
    let total = { sessions:0, messages:0, tools:0, duration:0 };
    dates.forEach(d => {
        const s = md[d];
        if(s) { total.sessions+=s.sessions; total.messages+=s.messages; total.tools+=s.tool_calls; total.duration+=s.duration_min; }
    });
    document.getElementById('detailStats').innerHTML = `
        <div class="stat-item"><div class="stat-value">${total.sessions}</div><div class="stat-label">세션 (7일)</div></div>
        <div class="stat-item"><div class="stat-value">${total.messages}</div><div class="stat-label">대화</div></div>
        <div class="stat-item"><div class="stat-value">${total.tools}</div><div class="stat-label">도구 호출</div></div>
        <div class="stat-item"><div class="stat-value">${total.duration}m</div><div class="stat-label">총 시간</div></div>
    `;

    // Daily chart
    if(detailDailyChart) detailDailyChart.destroy();
    detailDailyChart = new Chart(document.getElementById('detailDailyChart'), {
        type:'bar',
        data: {
            labels: dates.map(d=>d.slice(5)),
            datasets: [
                { label:'세션', data:dates.map(d=>md[d]?.sessions||0), backgroundColor:'#6366f1' },
                { label:'도구', data:dates.map(d=>md[d]?.tool_calls||0), backgroundColor:'#22c55e' },
            ]
        },
        options: chartOpts(),
    });

    // Tool chart
    let allTools = {};
    dates.forEach(d => {
        Object.entries(md[d]?.top_tools||{}).forEach(([t,c]) => { allTools[t]=(allTools[t]||0)+c; });
    });
    const topTools = Object.entries(allTools).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if(detailToolChart) detailToolChart.destroy();
    detailToolChart = new Chart(document.getElementById('detailToolChart'), {
        type:'doughnut',
        data: {
            labels: topTools.map(([t])=>t.replace('mcp__plugin_ouroboros_ouroboros__','ouroboros:').slice(0,20)),
            datasets: [{ data:topTools.map(([,c])=>c), backgroundColor:COLORS }]
        },
        options: { responsive:true, plugins:{ legend:{ position:'right', labels:{ color:'#6b6b7b', font:{size:10} } } } }
    });

    panel.scrollIntoView({ behavior:'smooth' });
}

function closeDetail() {
    document.getElementById('detailPanel').classList.remove('visible');
}

function renderMissing() {
    const participating = new Set(Object.keys(MEMBERS_DAILY).map(m=>m.toUpperCase()));
    const allNames = new Set(Object.values(TEAM_MEMBERS));
    const missing = [...allNames].filter(n => !participating.has(n));
    const el = document.getElementById('missingSection');
    if (missing.length) {
        el.innerHTML = `<div class="missing-section"><h4>미수집 구성원</h4><div class="missing-names">${missing.join(', ')}</div><code>cd ~/Documents/ark_point/repos/ark-agents && bash ai-monitor/install.sh</code></div>`;
    } else {
        el.innerHTML = '';
    }
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function chartOpts() { return { responsive:true, plugins:{legend:{labels:{color:'#6b6b7b',font:{size:11}}}}, scales:{x:{ticks:{color:'#6b6b7b'},grid:{color:'#1e1e2e'}},y:{ticks:{color:'#6b6b7b'},grid:{color:'#1e1e2e'}}} }; }

init();
</script>
