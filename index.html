.header { margin-bottom:3.5rem; }

.filter-btn:hover { color:var(--text); background:var(--surface-dim); }
.filter-btn.active { background:var(--text); color:var(--bg); border-color:var(--text); font-weight:600; }
#memberButtons { display:contents; }

.kpi-hero-value { font-family:var(--serif); font-size:clamp(3rem,6vw,4.5rem); font-weight:700; line-height:1; letter-spacing:-0.03em; font-variant-numeric:tabular-nums; }
.kpi-hero-value .unit { font-size:0.5em; color:var(--text-secondary); }

.kpi-cell:last-child { border-right:none; }
.kpi-cell-value { font-family:var(--mono); font-size:1.4rem; font-weight:600; color:var(--text); font-variant-numeric:tabular-nums; line-height:1; }
.kpi-cell-label { font-size:0.7rem; color:var(--text-tertiary); margin-top:0.3rem; }
.section-label { font-family:var(--mono); font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-tertiary); margin-bottom:1.2rem; padding-bottom:0.8rem; border-bottom:1px solid var(--border); }

.lb-block-desc { font-size:0.7rem; color:var(--text-tertiary); margin-bottom:0.8rem; }

const fmt = n => Number(n).toLocaleString();
const fmtH = m => { const h=m/60; return h>=1 ? (h%1===0?h+'h':h.toFixed(1)+'h') : m+'m'; };

let currentPeriod = 7;

Chart.defaults.color = '#a1a1aa';

function init() {
    renderMemberButtons();
    updateAll();
}

function setPeriod(days) {
    currentPeriod = days;
    document.querySelectorAll('.filters .filter-group:first-child .filter-btn').forEach(b => {
        const labels = {1:'24h',3:'3d',7:'7d',30:'30d',0:'All'};
        b.classList.toggle('active', b.textContent === labels[days]);
    });
    updateAll();
}

function updateAll() {
    currentDateFilter = currentPeriod === 0 ? 'all' : 'period';
    updateDashboard();
    renderLeaderboard();
}

function renderMemberButtons() {
    const container = document.getElementById('memberButtons');
    Object.keys(MEMBERS_DAILY).forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = m;
        btn.dataset.member = m;
        btn.onclick = () => setMemberFilter(m);
        container.appendChild(btn);
    });
}

function setMemberFilter(m) {
    currentMemberFilter = m;
    document.querySelectorAll('.filters .filter-group:nth-child(2) .filter-btn').forEach(b => b.classList.remove('active'));
    if (m === 'all') {
        document.querySelector('.filters .filter-group:nth-child(2) .filter-btn').classList.add('active');
    } else {
        document.querySelectorAll('#memberButtons .filter-btn').forEach(b => {
            if (b.dataset.member === m) b.classList.add('active');
        });
    }
    updateAll();
}

function getPeriodDates() {
    if (currentPeriod === 0) return ALL_DATES;
    return ALL_DATES.slice(-currentPeriod);
}

function getFilteredData() {
    const members = currentMemberFilter === 'all' ? Object.keys(MEMBERS_DAILY) : [currentMemberFilter];
    const dates = getPeriodDates();
    let totals = { sessions:0, messages:0, tool_calls:0, duration_min:0 };
    const ADVANCED_TOOLS = ['agent','skill','mcp','enterplanmode','exitplanmode'];
    let advancedCalls = 0;
    let activeMemberSet = new Set();
    members.forEach(m => {
        const md = MEMBERS_DAILY[m] || {};
        let hasActivity = false;
        dates.forEach(d => {
            const s = md[d];
            if (s) {
                totals.sessions += s.sessions;
                totals.messages += s.messages;
                totals.tool_calls += s.tool_calls;
                totals.duration_min += s.duration_min;
                hasActivity = true;
                Object.entries(s.top_tools || {}).forEach(([t,c]) => {
                    if (ADVANCED_TOOLS.some(a => t.toLowerCase().includes(a)) || t.toLowerCase().startsWith('mcp_')) advancedCalls += c;
                });
                Object.values(s.skills_used || {}).forEach(c => { advancedCalls += c; });
            }
        });
        if (hasActivity) activeMemberSet.add(m);
    });
    const totalMembers = Object.keys(TEAM_MEMBERS).length;
    const activeRate = totalMembers ? Math.round(activeMemberSet.size / totalMembers * 100) : 0;
    const depthRate = totals.tool_calls ? Math.round(advancedCalls / totals.tool_calls * 100) : 0;
    return { members, dates, totals, activeRate, depthRate, activeCount: activeMemberSet.size, totalMembers };
}

function updateDashboard() {
    const { members, dates, totals, activeRate, depthRate, activeCount, totalMembers } = getFilteredData();
    renderKPIs(totals, members, activeRate, depthRate, activeCount, totalMembers);
    renderMemberCards(members, dates);
    renderMemberTrendChart(members, dates);
    renderDailyCompareChart(members, dates);
    renderMissing(members);
}

function renderKPIs(totals, members, activeRate, depthRate, activeCount, totalMembers) {
    const rc = activeRate>=80?'positive':activeRate>=50?'warning':'danger';
    const dc = depthRate>=30?'positive':depthRate>=10?'warning':'danger';
    document.getElementById('kpiHero').innerHTML = `
        <div class="kpi-hero-card ${rc}"><div class="kpi-hero-value">${activeRate}<span class="unit">%</span></div><div class="kpi-hero-label">Team Active Rate (${activeCount} / ${totalMembers})</div></div>
        <div class="kpi-hero-card ${dc}"><div class="kpi-hero-value">${depthRate}<span class="unit">%</span></div><div class="kpi-hero-label">AI Depth (Advanced / Total)</div></div>`;
    document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-cell"><div class="kpi-cell-value">${fmt(totals.sessions)}</div><div class="kpi-cell-label">Sessions</div></div>
        <div class="kpi-cell"><div class="kpi-cell-value">${fmt(totals.messages)}</div><div class="kpi-cell-label">Conversations</div></div>
        <div class="kpi-cell"><div class="kpi-cell-value">${fmt(totals.tool_calls)}</div><div class="kpi-cell-label">Tool Calls</div></div>
        <div class="kpi-cell"><div class="kpi-cell-value">${fmtH(totals.duration_min)}</div><div class="kpi-cell-label">AI Time</div></div>`;
}

function renderMemberCards(members, dates) {
    const grid = document.getElementById('membersGrid');
    grid.innerHTML = '';
    members.forEach(m => {
        const md = MEMBERS_DAILY[m] || {};
        let totals = { sessions:0, messages:0, tool_calls:0, duration:0, tools:{}, skills:{} };
        dates.forEach(d => {
            const s = md[d];
            if (s) {
                totals.sessions += s.sessions;
                totals.messages += s.messages;
                totals.tool_calls += s.tool_calls;
                totals.duration += s.duration_min;
                Object.entries(s.top_tools || {}).forEach(([t,c]) => { totals.tools[t] = (totals.tools[t]||0) + c; });
                Object.entries(s.skills_used || {}).forEach(([s2,c]) => { totals.skills[s2] = (totals.skills[s2]||0) + c; });
            }
        });

        const level = totals.tool_calls > 50 ? 'high' : totals.tool_calls > 10 ? 'mid' : 'low';
        const toolEntries = Object.entries(totals.tools).sort((a,b) => b[1]-a[1]).slice(0,5);
        const maxTool = toolEntries.length ? Math.max(...toolEntries.map(e=>e[1])) || 1 : 1;
        const toolBars = toolEntries.map(([t,c]) => {
            const short = t.replace('mcp__plugin_ouroboros_ouroboros__','ouroboros:');
            const pct = c/maxTool*100;
            return `<div class="tool-row"><span class="tool-name">${esc(short)}</span><div class="tool-bar-bg"><div class="tool-bar" style="width:${pct}%"></div></div><span class="tool-count">${fmt(c)}</span></div>`;
        }).join('');
        const skillTags = Object.keys(totals.skills).map(s => `<span class="skill-tag">/${esc(s)}</span>`).join(' ');

        const card = document.createElement('div');
        card.className = `member-card ${level}`;
        card.onclick = () => showDetail(m);
        card.innerHTML = `
            <div class="level-indicator"></div>
            <div class="member-header"><h3>${esc(m)}</h3><span class="member-badge">${totals.sessions} sessions</span></div>
            <div class="member-stats">

            </div>
            <div class="tools-section"><h4>Top Tools</h4>${toolBars}</div>
            ${skillTags ? '<div class="skills">'+skillTags+'</div>' : ''}

        grid.appendChild(card);
    });

        label: m,
        data: displayDates.map(d => (MEMBERS_DAILY[m]||{})[d]?.tool_calls || 0),
        borderColor: PALETTE[i % PALETTE.length],
        backgroundColor: PALETTE[i % PALETTE.length] + '18',
        fill: true, tension: 0.3, borderWidth: 1.5, pointRadius: 0, pointHitRadius: 8,
    }));
    memberTrendChart = new Chart(ctx, {
        type: 'line',
        data: { labels: displayDates.map(d => d.slice(5)), datasets },
        options: chartOpts(),
    });
}

function renderDailyCompareChart(members, dates) {
    const ctx = document.getElementById('dailyCompareChart');
    if (dailyCompareChart) dailyCompareChart.destroy();
    const displayDates = getPeriodDates();
    const datasets = members.map((m, i) => ({
        label: m,
        data: displayDates.map(d => (MEMBERS_DAILY[m]||{})[d]?.sessions || 0),
        backgroundColor: PALETTE[i % PALETTE.length] + '90',
        borderColor: PALETTE[i % PALETTE.length],
        borderWidth: 1, borderRadius: 2,
    }));
    dailyCompareChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: displayDates.map(d => d.slice(5)), datasets },
        options: chartOpts(),
    });
}

// === DETAIL VIEW ===
function showDetail(member) {
    const panel = document.getElementById('detailPanel');
    panel.classList.add('visible');
    document.getElementById('detailTitle').textContent = member;

    const md = MEMBERS_DAILY[member] || {};
    const dates = Object.keys(md).sort().slice(-7);

    // Stats
    let total = { sessions:0, messages:0, tools:0, duration:0 };
    dates.forEach(d => {
        const s = md[d];
        if(s) { total.sessions+=s.sessions; total.messages+=s.messages; total.tools+=s.tool_calls; total.duration+=s.duration_min; }
    });
    document.getElementById('detailStats').innerHTML = `
        <div class="stat-item"><div class="stat-value">${total.sessions}</div><div class="stat-label">Sessions (7d)</div></div>
        <div class="stat-item"><div class="stat-value">${fmt(total.messages)}</div><div class="stat-label">Conv</div></div>
        <div class="stat-item"><div class="stat-value">${fmt(total.tools)}</div><div class="stat-label">Tools</div></div>
        <div class="stat-item"><div class="stat-value">${fmtH(total.duration)}</div><div class="stat-label">Time</div></div>
    `;

    // Daily chart
    if(detailDailyChart) detailDailyChart.destroy();
    detailDailyChart = new Chart(document.getElementById('detailDailyChart'), {
        type:'bar',
        data: {
            labels: dates.map(d=>d.slice(5)),
            datasets: [
                { label:'Sessions', data:dates.map(d=>md[d]?.sessions||0), backgroundColor:'#059669', borderRadius:2 },
                { label:'Tools', data:dates.map(d=>md[d]?.tool_calls||0), backgroundColor:'#0284c7', borderRadius:2 },
            ]
        },
        options: chartOpts(),
    });

    // Tool chart
    let allTools = {};
    dates.forEach(d => {
        Object.entries(md[d]?.top_tools||{}).forEach(([t,c]) => { allTools[t]=(allTools[t]||0)+c; });
    });
    const topTools = Object.entries(allTools).sort((a,b)=>b[1]-a[1]).slice(0,8);
    if(detailToolChart) detailToolChart.destroy();
    detailToolChart = new Chart(document.getElementById('detailToolChart'), {
        type:'doughnut',
        data: {
            labels: topTools.map(([t])=>t.replace('mcp__plugin_ouroboros_ouroboros__','ouroboros:').slice(0,20)),
            datasets: [{ data:topTools.map(([,c])=>c), backgroundColor:PALETTE, borderWidth:0 }]
        },
        options: { responsive:true, cutout:'65%', plugins:{ legend:{ position:'right', labels:{ color:'#a1a1aa', font:{size:9, family:"'JetBrains Mono', monospace"}, padding:8 } } } }
    });

    panel.scrollIntoView({ behavior:'smooth' });
}

function closeDetail() {
    document.getElementById('detailPanel').classList.remove('visible');
}

function getMemberTotals(member, dates) {
    const md = MEMBERS_DAILY[member] || {};
    let t = {sessions:0, messages:0, tool_calls:0, duration:0, tools:{}, skills:{}};
    dates.forEach(d => {
        const s = md[d];
        if(s) {
            t.sessions+=s.sessions; t.messages+=s.messages; t.tool_calls+=s.tool_calls; t.duration+=s.duration_min;
            Object.entries(s.top_tools||{}).forEach(([k,v])=>{t.tools[k]=(t.tools[k]||0)+v;});
            Object.entries(s.skills_used||{}).forEach(([k,v])=>{t.skills[k]=(t.skills[k]||0)+v;});
        }
    });
    return t;
}

function renderLeaderboard() {
    const dates = getPeriodDates();
    const members = Object.keys(MEMBERS_DAILY);
    const stats = members.map(m => {
        const t = getMemberTotals(m, dates);
        const skillCount = Object.values(t.skills).reduce((a,b)=>a+b, 0);
        const efficiency = t.sessions > 0 ? Math.round((t.tool_calls / t.sessions) * (Object.keys(t.skills).length + 1)) : 0;
        return {name:m, ...t, skillCount, uniqueSkills:Object.keys(t.skills).length, efficiency};
    }).filter(s => s.sessions > 0);
    const lb = document.getElementById('leaderboard');
    const boards = [
        {title:'Most Active',key:'tool_calls',desc:'Total tool invocations'},
        {title:'Skill Adoption',key:'uniqueSkills',desc:'Unique workflows used'},
        {title:'Most Efficient',key:'efficiency',desc:'Tools/session × diversity'},
        {title:'Top Skill Users',key:'skillCount',desc:'Total skill invocations'},
    ];
    lb.innerHTML = boards.map(b => {
        const sorted = [...stats].sort((a,c) => c[b.key] - a[b.key]);
        const rows = sorted.slice(0,5).map((s,i) =>
            `<div class="lb-row"><span class="lb-rank">${String(i+1).padStart(2,'0')}</span><span class="lb-name">${esc(s.name)}</span><span class="lb-value">${fmt(s[b.key])}</span></div>`
        ).join('');
        return `<div class="lb-block"><div class="lb-block-title">${b.title}</div><div class="lb-block-desc">${b.desc}</div>${rows||'<div style="color:var(--text-tertiary);padding:1rem 0;font-size:0.8rem">Collecting data</div>'}</div>`;
    }).join('');
}

function renderMissing() {
    const participating = new Set(Object.keys(MEMBERS_DAILY));
    const allNames = new Set(Object.values(TEAM_MEMBERS));
    const missing = [...allNames].filter(n => !participating.has(n));
    const el = document.getElementById('missingSection');
    if (missing.length) {
        el.innerHTML = `<div class="missing-block"><h4>Not Yet Connected</h4><div class="missing-names">${missing.join(', ')}</div><code>cd ~/Documents/ark_point/repos/ark-agents && bash ai-monitor/install.sh</code></div>`;
    } else {
        el.innerHTML = '';
    }
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function chartOpts() { return { responsive:true, plugins:{legend:{labels:{color:'#a1a1aa',font:{size:9,family:"'JetBrains Mono', monospace"},padding:12}}}, scales:{x:{ticks:{color:'#a1a1aa',font:{size:9}},grid:{color:'#f0f1f3'}},y:{ticks:{color:'#a1a1aa',font:{size:9}},grid:{color:'#f0f1f3'}}} }; }

init();
</script>
